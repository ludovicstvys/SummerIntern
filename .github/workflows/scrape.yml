name: Scrape Notion

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# 1. autoriser l’écriture du GITHUB_TOKEN
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python & Playwright
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests
          python -m playwright install --with-deps

      - name: Run scraper and sync to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          TODO_DATA_SOURCE_ID: ${{ secrets.TODO_DATA_SOURCE_ID }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS_APP: ${{ secrets.SMTP_PASS_APP }}
          TO_ADDRS: ${{ secrets.TO_ADDRS }}
        run: python test.py

      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processus_ouverts.csv
          if ! git diff --cached --quiet; then
            git commit -m "Mise à jour du CSV des internships"
            git push
          else
            echo "Aucun changement détecté dans processus_ouverts.csv, rien à push."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
